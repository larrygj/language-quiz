<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deutsch — German Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0d;--card:#181810;--border:#2e2c1a;
    --accent:#d4a017;--accent2:#cc0000;--accent3:#f5f0e0;
    --correct:#4be87e;--wrong:#e84b4b;
    --text:#f0ede0;--muted:#6e6b50;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:
    radial-gradient(ellipse 65% 45% at 10% 10%,rgba(212,160,23,0.08) 0%,transparent 55%),
    radial-gradient(ellipse 55% 45% at 92% 85%,rgba(204,0,0,0.07) 0%,transparent 55%);
    pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;width:100%;max-width:560px;}

  /* SPLASH */
  #splash-screen{text-align:center;padding:20px;}
  .splash-logo{font-family:'Josefin Sans',sans-serif;font-size:clamp(2.8rem,9vw,4.4rem);font-weight:700;letter-spacing:4px;text-transform:uppercase;line-height:1;margin-bottom:4px;}
  .splash-logo .bk{color:var(--text);}
  .splash-logo .rd{color:var(--accent2);}
  .splash-logo .gd{color:var(--accent);}
  .splash-tagline{font-family:'Inter',sans-serif;font-size:0.78rem;color:var(--muted);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:32px;}
  .splash-features{list-style:none;text-align:left;display:inline-flex;flex-direction:column;gap:14px;margin-bottom:38px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;width:100%;max-width:380px;}
  .splash-features li{display:flex;align-items:center;gap:12px;font-size:0.93rem;color:var(--text);}
  .splash-features li .icon{font-size:1.3rem;width:28px;flex-shrink:0;text-align:center;}
  .start-btn{background:var(--accent2);color:#fff;border:none;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:1.05rem;font-weight:500;padding:18px 56px;cursor:pointer;letter-spacing:0.03em;display:inline-block;}
  .start-btn:active{transform:scale(0.96);background:#990000;}
  .splash-note{color:var(--muted);font-size:0.74rem;margin-top:14px;}

  /* HEADER */
  header{text-align:center;margin-bottom:24px;}
  .logo{font-family:'Josefin Sans',sans-serif;font-size:clamp(1.8rem,5vw,2.5rem);font-weight:700;letter-spacing:3px;text-transform:uppercase;}
  .logo .bk{color:var(--text);}
  .logo .rd{color:var(--accent2);}
  .logo .gd{color:var(--accent);}
  .subtitle{color:var(--muted);font-size:0.72rem;letter-spacing:0.16em;text-transform:uppercase;margin-top:4px;}

  /* PROGRESS */
  .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .progress-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,#1a1a1a,var(--accent2),var(--accent));border-radius:99px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
  .progress-label{font-size:0.72rem;color:var(--muted);white-space:nowrap;}
  .score-badge{background:var(--card);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:0.78rem;font-weight:500;color:var(--accent);white-space:nowrap;}

  /* WORD CARD */
  .word-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:34px 24px 24px;margin-bottom:14px;text-align:center;position:relative;transition:border-color 0.3s;}
  .word-card.correct{border-color:var(--correct);}
  .word-card.wrong{border-color:var(--wrong);}
  .word-number{position:absolute;top:12px;left:16px;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
  .speak-btn{position:absolute;top:10px;right:14px;background:none;border:1px solid var(--border);border-radius:99px;color:var(--accent);font-size:1rem;cursor:pointer;padding:4px 10px;line-height:1.5;}
  .speak-btn:active{background:rgba(212,160,23,0.15);border-color:var(--accent);}
  .german-word{font-family:'Josefin Sans',sans-serif;font-size:clamp(1.6rem,6vw,2.8rem);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px;line-height:1.15;}
  .word-hint{font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}

  /* CHOICES */
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
  .choice-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:0.86rem;font-weight:400;padding:16px 10px;cursor:pointer;text-align:center;line-height:1.3;}
  .choice-btn:active:not(:disabled){background:rgba(212,160,23,0.08);border-color:var(--accent);transform:scale(0.97);}
  .choice-btn.correct{background:rgba(75,232,126,0.12);border-color:var(--correct);color:var(--correct);font-weight:500;}
  .choice-btn.wrong{background:rgba(232,75,75,0.12);border-color:var(--wrong);color:var(--wrong);font-weight:500;}
  .choice-btn:disabled{cursor:default;}

  /* FEEDBACK */
  .feedback{min-height:34px;text-align:center;font-size:0.87rem;color:var(--muted);margin-bottom:10px;}
  .feedback.show-correct{color:var(--correct);font-weight:500;}
  .feedback.show-wrong{color:var(--wrong);font-weight:500;}

  /* NEXT */
  .next-btn{width:100%;background:var(--accent2);color:#fff;border:none;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:500;padding:16px;cursor:pointer;display:none;}
  .next-btn:active{background:#990000;transform:scale(0.98);}
  .next-btn.visible{display:block;}

  /* DOTS */
  .dots-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background 0.3s;}
  .dot.correct{background:var(--correct);}
  .dot.wrong{background:var(--wrong);}

  /* RESULTS */
  #results-screen{display:none;text-align:center;padding:30px 20px;}
  .results-emoji{font-size:5rem;margin-bottom:14px;animation:pop 0.5s cubic-bezier(.4,0,.2,1);}
  @keyframes pop{0%{transform:scale(0.3);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
  .results-title{font-family:'Josefin Sans',sans-serif;font-size:2.2rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
  .results-champ{color:var(--accent);}
  .results-score{font-size:1.05rem;color:var(--muted);margin-bottom:28px;line-height:1.8;}
  .results-score strong{color:var(--text);font-size:1.4rem;}
  .restart-btn{background:var(--accent2);color:#fff;border:none;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:1rem;font-weight:500;padding:16px 40px;cursor:pointer;}
  .restart-btn:active{background:#990000;}

  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .shake{animation:shake 0.35s ease;}
  @keyframes pulse-correct{0%{box-shadow:0 0 0 0 rgba(75,232,126,0.4)}70%{box-shadow:0 0 0 12px rgba(75,232,126,0)}100%{box-shadow:0 0 0 0 rgba(75,232,126,0)}}
  .pulse-correct{animation:pulse-correct 0.5s ease;}
</style>
</head>

    <div class="feedback" id="feedback"></div>

  </div>

</div>

let audioCtx=null;
function unlockAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const buf=audioCtx.createBuffer(1,1,22050);
  const src=audioCtx.createBufferSource();
  src.buffer=buf;src.connect(audioCtx.destination);src.start(0);
}
function playTone(type){
  if(!audioCtx)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  const ctx=audioCtx,now=ctx.currentTime;
  if(type==='correct'){
    [523.25,659.25,783.99].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(freq,now+i*0.12);
      g.gain.setValueAtTime(0.28,now+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.35);
      o.start(now+i*0.12);o.stop(now+i*0.12+0.4);
    });
  }else{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(300,now);
    o.frequency.exponentialRampToValueAtTime(160,now+0.4);
    g.gain.setValueAtTime(0.18,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
    o.start(now);o.stop(now+0.55);
  }
}
let voices=[];
function loadVoices(){voices=window.speechSynthesis?speechSynthesis.getVoices():[];}
function speakGerman(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-DE';u.rate=0.88;u.pitch=1.0;
  if(!voices.length)loadVoices();
  const v=voices.find(v=>v.lang==='de-DE'||v.lang==='de-AT'||v.lang==='de-CH')
         ||voices.find(v=>v.lang.startsWith('de'));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
let questions=[],current=0,score=0,answered=false;
function shuffle(a){
  a=[...a];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
document.getElementById('start-btn').addEventListener('click',()=>{
  unlockAudio();loadVoices();
  document.getElementById('splash-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  initQuiz();
});
function initQuiz(){
  questions=shuffle(wordBank).slice(0,20);
  current=0;score=0;answered=false;
  buildDots();loadQuestion();
}
function restartQuiz(){
  document.getElementById('results-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  initQuiz();
}
function buildDots(){
  const row=document.getElementById('dots-row');row.innerHTML='';
  for(let i=0;i<20;i++){const d=document.createElement('div');d.className='dot';d.id='dot-'+i;row.appendChild(d);}
}
function loadQuestion(){
  answered=false;
  const q=questions[current];
  document.getElementById('progress-bar').style.width=(current/20*100)+'%';
  document.getElementById('progress-label').textContent=current+' / 20';
  document.getElementById('score-display').textContent=score;
  document.getElementById('word-number').textContent='Word '+(current+1);
  document.getElementById('german-word').textContent=q.de;
  document.getElementById('word-hint').textContent=q.hint;
  document.getElementById('word-card').className='word-card';
  const fb=document.getElementById('feedback');fb.textContent='';fb.className='feedback';
  const choices=shuffle([q.en,...q.decoys.slice(0,3)]);
  const el=document.getElementById('choices');el.innerHTML='';
  choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='choice-btn';b.textContent=c;
    b.addEventListener('click',()=>handleAnswer(c,q.en,b));
    el.appendChild(b);
  });
  document.getElementById('next-btn').className='next-btn';
  setTimeout(()=>speakGerman(q.de),350);
}
function handleAnswer(chosen,correct,btn){
  if(answered)return;answered=true;
  const ok=chosen===correct;
  const card=document.getElementById('word-card');
  const fb=document.getElementById('feedback');
  const nb=document.getElementById('next-btn');
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
  });
  if(ok){
    score++;btn.classList.add('correct');
    card.classList.add('correct','pulse-correct');
    fb.textContent='✓ Richtig! Gut gemacht!';fb.className='feedback show-correct';
  }else{
    btn.classList.add('wrong');card.classList.add('wrong','shake');
    fb.textContent='✗ Incorrect. The answer is: "'+correct+'"';fb.className='feedback show-wrong';
    setTimeout(()=>card.classList.remove('shake'),400);
  }
  playTone(ok?'correct':'wrong');
  const dot=document.getElementById('dot-'+current);
  if(dot)dot.className='dot '+(ok?'correct':'wrong');
  document.getElementById('score-display').textContent=score;
  nb.className='next-btn visible';
  nb.textContent=current===19?'See Results →':'Next word →';
}
document.getElementById('next-btn').addEventListener('click',()=>{
  current++;current>=20?showResults():loadQuestion();
});
document.getElementById('speak-btn').addEventListener('click',()=>{
  const w=document.getElementById('german-word').textContent;
  if(w&&w!=='—')speakGerman(w);
});
function showResults(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='block';
  const champ=score>=17;
  document.getElementById('results-emoji').textContent=champ?'🏆':score>=12?'💪':'📚';
  const t=document.getElementById('results-title');
  t.textContent=champ?'Meister!':score>=12?'Gut gemacht!':'Weiter üben!';
  t.className='results-title'+(champ?' results-champ':'');
  const msg=champ?"Outstanding! You're a true German champion 🌟":score>=12?"Solid work — keep building on this!":"Keep studying — you'll get there!";
  document.getElementById('results-score').innerHTML='You got <strong>'+score+' / 20</strong> correct.<br><small style="color:var(--muted)">'+msg+'</small>';
}
